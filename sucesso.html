<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado | Equilíbrio Multimarcas</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body style="background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">

    <div id="sucesso-container" style="background: #fff; padding: 50px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 90%;">
        <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #111; margin-bottom: 20px;"></i>
        <h2>PROCESSANDO SEU PEDIDO...</h2>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Esvazia o carrinho no navegador após a compra
            localStorage.setItem('equilibrio_cart', JSON.stringify([]));
            if (typeof atualizarContadores === 'function') atualizarContadores();

            // 2. Extrai o número do pedido enviado pelo checkout
            const urlParams = new URLSearchParams(window.location.search);
            const numeroPedido = urlParams.get('pedido');

            const container = document.getElementById('sucesso-container');

            if (numeroPedido) {
                // Desenha a tela de Sucesso
                container.innerHTML = `
                    <i class="fas fa-check-circle" style="font-size: 4rem; color: #28a745; margin-bottom: 20px;"></i>
                    <h1 style="font-weight: 900; text-transform: uppercase;">Pedido Realizado!</h1>
                    <p style="font-size: 1.1rem; color: #555; margin-top: 10px;">Obrigado pela sua compra no Equilíbrio Multimarcas.</p>
                    
                    <div style="background: #f8f9fa; border: 1px dashed #ccc; padding: 15px; border-radius: 8px; margin: 25px auto;">
                        <h3 style="margin: 0; color: #111; font-weight: 900;">PEDIDO #${numeroPedido}</h3>
                    </div>
                    
                    <p style="margin-bottom: 30px; color: #666;">Você pode acompanhar o status do envio e os detalhes do pagamento no seu painel.</p>
                    
                    <a href="minha-conta.html" style="display: inline-block; padding: 15px 30px; background: #111; color: #fff; text-decoration: none; font-weight: bold; border-radius: 4px; text-transform: uppercase;">Ver Meus Pedidos</a>
                    <br><br>
                    <a href="index.html" style="color: #666; font-weight: bold; text-decoration: none;"><i class="fas fa-arrow-left"></i> Voltar para a loja</a>
                `;
            } else {
                // Se a pessoa abrir a página sem fazer compra
                container.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #ffc107; margin-bottom: 20px;"></i>
                    <h2 style="font-weight: 900;">NENHUM PEDIDO ENCONTRADO</h2>
                    <p style="margin-bottom: 30px; color: #666;">Seu carrinho está vazio ou o pagamento expirou.</p>
                    <a href="index.html" style="display: inline-block; padding: 15px 30px; background: #111; color: #fff; text-decoration: none; font-weight: bold; border-radius: 4px;">Voltar para a loja</a>
                `;
            }
        });
    </script>
</body>
</html>
