<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Império Multimarcas | Compra Aprovada</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .success-layout { max-width: 600px; margin: 100px auto; text-align: center; padding: 40px; background: #fff; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .success-icon { font-size: 5rem; color: #28a745; margin-bottom: 20px; animation: scaleUp 0.5s ease-out; }
        .success-layout h1 { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .success-layout p { color: #666; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.5; }
        @keyframes scaleUp { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body style="background-color: #f4f6f9;">

    <div class="success-layout" id="success-box">
        <i class="fas fa-spinner fa-spin success-icon" style="color: #111;"></i>
        <h1>Processando seu Pedido...</h1>
        <p>Aguarde enquanto registramos sua compra no Império.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem('imperio_token');
            const box = document.getElementById('success-box');

            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Solicita ao backend a geração oficial do pedido
                const resposta = await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (resposta.ok) {
                    const dados = await resposta.json();
                    
                    // Limpa o carrinho
                    localStorage.removeItem('imperio_cart');
                    localStorage.removeItem('imperio_coupon');

                    // ==========================================
                    // LÓGICA VISUAL DO PIX
                    // ==========================================
                    const mpResultStr = sessionStorage.getItem('imperio_mp_result');
                    let pixHTML = "";

                    if (mpResultStr) {
                        const mpResult = JSON.parse(mpResultStr);
                        
                        if (mpResult.metodo === 'pix' && mpResult.pix) {
                            pixHTML = `
                                <div style="margin-top: 25px; padding: 25px; background: #fdfdfd; border: 2px dashed #009ee3; border-radius: 8px;">
                                    <h3 style="margin-bottom: 15px; color: #009ee3; font-weight: 900;"><i class="fab fa-pix"></i> Pague agora via Pix</h3>
                                    <p style="font-size: 0.9rem; margin-bottom: 15px;">Escaneie o QR Code abaixo no aplicativo do seu banco:</p>
                                    
                                    <img src="data:image/jpeg;base64,${mpResult.pix.qr_code_base64}" style="max-width: 200px; margin: 0 auto 20px auto; display: block; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                                    
                                    <p style="font-size: 0.9rem; margin-bottom: 5px; color:#666;">Ou copie o código "Copia e Cola":</p>
                                    <input type="text" value="${mpResult.pix.qr_code}" id="pixCode" readonly style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; font-family: monospace; background: #f4f6f9;">
                                    
                                    <button onclick="document.getElementById('pixCode').select(); document.execCommand('copy'); this.innerHTML='<i class=\\'fas fa-check\\'></i> Copiado!'; this.style.background='#28a745';" style="background: #111; color: #fff; border: none; padding: 12px 25px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; width: 100%;">
                                        <i class="far fa-copy"></i> Copiar Código Pix
                                    </button>
                                </div>
                            `;
                        }
                    }

                    // Monta a tela final
                    box.innerHTML = `
                        <i class="fas fa-check-circle success-icon"></i>
                        <h1>Pedido Registrado!</h1>
                        <p>Seu pedido <strong>#${dados.pedido_id}</strong> foi gerado com sucesso.</p>
                        ${pixHTML}
                        <a href="index.html" class="hero-btn" style="display:inline-block; margin-top: 20px;">Voltar para a Loja</a>
                    `;
                }

            } catch (e) {
                box.innerHTML = `<h1>Erro de conexão</h1><p>Não foi possível comunicar com o servidor.</p>`;
            }
        });
    </script>
</body>
</html>
