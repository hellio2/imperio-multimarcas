<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Império Multimarcas | Checkout Transparente</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://sdk.mercadopago.com/js/v2"></script>

    <style>
        .checkout-layout { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .checkout-box { background: #fff; padding: 40px; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .checkout-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .checkout-header h2 { font-size: 2rem; font-weight: 900; text-transform: uppercase; }
        .checkout-header i { color: #009ee3; font-size: 2.5rem; margin-bottom: 15px; }
        
        .cep-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .cep-area input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .cep-area button { padding: 0 25px; background: #111; color: #fff; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase;}
        
        .frete-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .frete-card { border: 1px solid #ddd; padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.3s; }
        
        /* Oculta o container do brick até ele carregar o valor */
        #paymentBrick_container { min-height: 400px; }
    </style>
</head>
<body style="background-color: #f4f6f9;">

    <div class="checkout-layout">
        <div class="checkout-box">
            <div class="checkout-header">
                <i class="fas fa-lock"></i>
                <h2>Finalizar <span>Pedido</span></h2>
                <p>Ambiente 100% seguro. Seus dados não são salvos nos nossos servidores.</p>
            </div>

            <div style="margin-bottom: 30px;">
                <h4 style="margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem;">1. Calcular Frete</h4>
                <div class="cep-area">
                    <input type="text" id="cep-input" placeholder="Digite seu CEP (Somente números)" maxlength="8">
                    <button onclick="calcularFrete()">Calcular</button>
                </div>
                <div id="frete-resultados" class="frete-options"></div>
            </div>

            <div style="border-top: 1px solid #eee; padding-top: 30px;">
                <h4 style="margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem;">2. Pagamento Seguro</h4>
                
                <div id="paymentBrick_container">
                    <p style="text-align: center; color: #666; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Carregando ambiente seguro...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de Frete (Mantida intacta)
        async function calcularFrete() {
            const cep = document.getElementById('cep-input').value;
            const container = document.getElementById('frete-resultados');
            if (cep.length < 8) return alert('Digite um CEP válido.');
            
            container.innerHTML = '<p>Calculando rota com os Correios...</p>';
            try {
                const resposta = await fetch('/api/frete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cep_destino: cep })
                });
                const dados = await resposta.json();
                if (resposta.ok) {
                    container.innerHTML = dados.fretes.map(f => `
                        <div class="frete-card">
                            <div><strong>${f.Codigo === '04014' ? 'SEDEX' : 'PAC'}</strong><br><small>${f.PrazoEntrega} dias úteis</small></div>
                            <strong>R$ ${f.Valor}</strong>
                        </div>
                    `).join('');
                } else { container.innerHTML = `<p style="color: red;">${dados.erro}</p>`; }
            } catch (e) { container.innerHTML = '<p style="color: red;">Erro ao calcular frete.</p>'; }
        }

        // =========================================================
        // INICIALIZAÇÃO DO MERCADO PAGO BRICKS (COM DIAGNÓSTICO)
        // =========================================================
        document.addEventListener("DOMContentLoaded", async () => {
            const tokenAuth = localStorage.getItem('imperio_token');
            const containerBrick = document.getElementById('paymentBrick_container');

            if (!tokenAuth) {
                alert("Sessão expirada. Faça login para continuar.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // 1. Pega a Chave Pública do Backend
                const configRes = await fetch('/api/config/mp');
                const configData = await configRes.json();
                
                // Validação de segurança: Verifica se a chave realmente chegou
                if (!configData.publicKey) {
                    throw new Error("Chave Pública não encontrada. Você reiniciou o servidor após alterar o .env?");
                }
                
                const mp = new MercadoPago(configData.publicKey, { locale: 'pt-BR' });

                // 2. Consulta o carrinho
                const cartRes = await fetch('/api/carrinho', { headers: { 'Authorization': `Bearer ${tokenAuth}` }});
                const cartData = await cartRes.json();
                
                // Validação de segurança: Verifica se o token expirou ou deu erro
                if (cartData.erro) {
                    throw new Error("Falha ao ler carrinho: " + cartData.erro);
                }

                if(!Array.isArray(cartData) || cartData.length === 0) {
                    containerBrick.innerHTML = "<p style='text-align:center; padding: 20px;'>Seu carrinho está vazio.</p>";
                    return;
                }

                // Soma o total validando se é um número (evita erro NaN)
                const totalAmount = cartData.reduce((acc, item) => {
                    const preco = parseFloat(item.preco);
                    const qtd = parseInt(item.qtd);
                    return acc + (isNaN(preco) ? 0 : preco * qtd);
                }, 0);

                if (totalAmount <= 0) {
                    throw new Error("O valor total do carrinho é inválido ou zero.");
                }

                // 3. Constrói o formulário
                const bricksBuilder = mp.bricks();
                containerBrick.innerHTML = ""; // Limpa a tela de loading

                await bricksBuilder.create('payment', 'paymentBrick_container', {
                    initialization: { amount: totalAmount },
                    customization: {
                        paymentMethods: {
                            ticket: "all",
                            creditCard: "all",
                            bankTransfer: "all"
                        }
                    },
                    callbacks: {
                        onReady: () => { console.log('Brick carregado com sucesso!'); },
                        onSubmit: (paymentData) => {
                            return new Promise((resolve, reject) => {
                                fetch('/api/pagamento/processar', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${tokenAuth}`
                                    },
                                    body: JSON.stringify(paymentData.formData)
                                })
                                .then((res) => res.json())
                                .then((data) => {
                                    if (data.sucesso) {
                                        // GUARDA OS DADOS DO PIX NA MEMÓRIA ANTES DE MUDAR DE PÁGINA
                                        sessionStorage.setItem('imperio_mp_result', JSON.stringify(data));
                                        
                                        window.location.href = 'sucesso.html';
                                        resolve();
                                    } else {
                                        alert("Aviso: " + (data.erro || "Falha no pagamento"));
                                        reject();
                                    }
                                })
                                .catch((error) => {
                                    alert("Falha de conexão com o banco.");
                                    reject();
                                });
                            });
                        },
                        onError: (error) => {
                            console.error("Erro interno do Brick:", error);
                        }
                    }
                });

            } catch (error) {
                // AGORA O ERRO EXATO VAI APARECER NO CONSOLE (F12) E NA TELA
                console.error("🕵️‍♂️ Diagnóstico de Erro:", error.message || error);
                document.getElementById('paymentBrick_container').innerHTML = `
                    <div style="padding: 20px; text-align:center; border: 1px solid #dc3545; border-radius: 8px; background: #fff8f8;">
                        <h4 style="color: #dc3545; margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i> Falha na Integração</h4>
                        <p style="color: #666; font-size: 0.9rem;">${error.message || "Erro desconhecido. Abra o F12 para ver o console."}</p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
