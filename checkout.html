<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Império Multimarcas | Checkout Seguro</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .checkout-layout { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .checkout-box { background: #fff; padding: 40px; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .checkout-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .checkout-header h2 { font-size: 2rem; font-weight: 900; text-transform: uppercase; }
        .checkout-header i { color: #009ee3; font-size: 2.5rem; margin-bottom: 15px; } /* Cor do MP */
        
        .cep-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .cep-area input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .cep-area button { padding: 0 25px; background: #111; color: #fff; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase;}
        
        .frete-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .frete-card { border: 1px solid #ddd; padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.3s; }
        .frete-card:hover { border-color: #111; }
        
        .checkout-btn { width: 100%; background: #009ee3; color: #fff; border: none; padding: 20px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .checkout-btn:hover { background: #007eb5; }
        
        .secure-badge { text-align: center; font-size: 0.85rem; color: #666; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body style="background-color: #f4f6f9;">

    <div class="checkout-layout">
        <div class="checkout-box">
            <div class="checkout-header">
                <i class="fas fa-lock"></i>
                <h2>Finalizar <span>Pedido</span></h2>
                <p>Ambiente 100% seguro. Seus dados são criptografados.</p>
            </div>

            <div style="margin-bottom: 30px;">
                <h4 style="margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem;">1. Calcular Frete</h4>
                <div class="cep-area">
                    <input type="text" id="cep-input" placeholder="Digite seu CEP (Somente números)" maxlength="8">
                    <button onclick="calcularFrete()">Calcular</button>
                </div>
                <div id="frete-resultados" class="frete-options"></div>
            </div>

            <div style="border-top: 1px solid #eee; padding-top: 30px;">
                <h4 style="margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem;">2. Pagamento Seguro</h4>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Você será redirecionado para a plataforma oficial do Mercado Pago para efetuar o pagamento via Pix, Boleto ou Cartão de Crédito.</p>
                
                <button class="checkout-btn" id="btn-pagar" onclick="iniciarPagamento()">
                    Ir para Pagamento Seguro <i class="fas fa-shield-alt" style="margin-left: 10px;"></i>
                </button>
                
                <div class="secure-badge">
                    <i class="fas fa-check-circle" style="color: #28a745;"></i> Processado por Mercado Pago
                </div>
            </div>
        </div>
    </div>

    <script>
        async function calcularFrete() {
            const cep = document.getElementById('cep-input').value;
            const container = document.getElementById('frete-resultados');
            
            if (cep.length < 8) return alert('Digite um CEP válido.');
            
            container.innerHTML = '<p>Calculando rota com os Correios...</p>';
            
            try {
                const resposta = await fetch('/api/frete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cep_destino: cep })
                });
                
                const dados = await resposta.json();
                if (resposta.ok) {
                    container.innerHTML = dados.fretes.map(f => `
                        <div class="frete-card">
                            <div>
                                <strong style="text-transform: uppercase;">${f.Codigo === '04014' ? 'SEDEX' : 'PAC'}</strong>
                                <p style="font-size: 0.85rem; color: #666; margin-top: 5px;">Entrega em até ${f.PrazoEntrega} dias úteis</p>
                            </div>
                            <strong style="font-size: 1.1rem;">R$ ${f.Valor}</strong>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p style="color: red;">${dados.erro}</p>`;
                }
            } catch (e) {
                container.innerHTML = '<p style="color: red;">Erro ao calcular frete.</p>';
            }
        }

        async function iniciarPagamento() {
            const token = localStorage.getItem('imperio_token');
            const btn = document.getElementById('btn-pagar');
            
            if (!token) {
                alert("Você precisa estar logado para finalizar a compra.");
                window.location.href = 'login.html';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando link seguro...';
            btn.disabled = true;

            try {
                const resposta = await fetch('/api/pagamento/checkout', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const dados = await resposta.json();

                if (resposta.ok && dados.init_point) {
                    // Redireciona o cliente para a URL do Mercado Pago
                    window.location.href = dados.init_point;
                } else {
                    alert(dados.erro || "Erro ao gerar pagamento. Verifique seu carrinho.");
                    btn.innerHTML = 'Tentar Novamente';
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Erro de conexão com o servidor de pagamentos.");
                btn.innerHTML = 'Tentar Novamente';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
