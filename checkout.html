<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilíbrio Multimarcas | Checkout Transparente</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        .checkout-layout { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .checkout-box { background: #fff; padding: 40px; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .checkout-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .checkout-header h2 { font-size: 2rem; font-weight: 900; text-transform: uppercase; }
        .checkout-header i { color: #009ee3; font-size: 2.5rem; margin-bottom: 15px; }
        
        .cep-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .cep-area input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .cep-area button { padding: 0 25px; background: #111; color: #fff; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase;}
        
        .frete-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .frete-card { border: 1px solid #ddd; padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.3s; }
        
        .hidden { display: none; }
    </style>
</head>
<body style="background-color: #f4f6f9;">

    <div class="checkout-layout">
        <div class="checkout-box">
            <div class="checkout-header">
                <i class="fas fa-lock"></i>
                <h2>Finalizar <span>Pedido</span></h2>
                <p>Ambiente 100% seguro. Seus dados não são salvos nos nossos servidores.</p>
            </div>

            <div style="margin-bottom: 30px;">
                <h4 style="margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem;">1. Calcular Frete</h4>
                <div class="cep-area">
                    <input type="text" id="cep-input" placeholder="Digite seu CEP (Somente números)" maxlength="8">
                    <button onclick="calcularFrete()">Calcular</button>
                </div>
                <div id="frete-resultados" class="frete-options"></div>
            </div>

            <div style="border-top: 1px solid #eee; padding-top: 30px;">
                <h4 style="margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem;">2. Pagamento Seguro</h4>
                
                <form id="payment-form">
                    <div id="payment-element">
                        <p style="text-align: center; color: #666; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Carregando ambiente seguro...</p>
                    </div>
                    
                    <button id="submit" style="margin-top:20px; width:100%; padding: 15px; background: #111; color: #fff; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: background 0.3s;">
                        <span id="button-text">Pagar Agora</span>
                    </button>
                    
                    <div id="payment-message" style="color: #dc3545; margin-top: 15px; text-align: center; font-weight: bold;" class="hidden"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // LÓGICA DE FRETE CORREIOS (MANTIDA INTACTA)
        // =========================================================
        async function calcularFrete() {
            const cep = document.getElementById('cep-input').value;
            const container = document.getElementById('frete-resultados');
            if (cep.length < 8) return alert('Digite um CEP válido.');
            
            container.innerHTML = '<p>Calculando rota com os Correios...</p>';
            try {
                const resposta = await fetch('/api/frete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cep_destino: cep })
                });
                const dados = await resposta.json();
                if (resposta.ok) {
                    container.innerHTML = dados.fretes.map(f => `
                        <div class="frete-card">
                            <div><strong>${f.Codigo === '04014' ? 'SEDEX' : 'PAC'}</strong><br><small>${f.PrazoEntrega} dias úteis</small></div>
                            <strong>R$ ${f.Valor}</strong>
                        </div>
                    `).join('');
                } else { container.innerHTML = `<p style="color: red;">${dados.erro}</p>`; }
            } catch (e) { container.innerHTML = '<p style="color: red;">Erro ao calcular frete.</p>'; }
        }

        // =========================================================
        // INICIALIZAÇÃO DO STRIPE ELEMENTS
        // =========================================================
        document.addEventListener("DOMContentLoaded", async () => {
            const tokenAuth = localStorage.getItem('equilibrio_token');

            if (!tokenAuth) {
                alert("Sessão expirada. Faça login para continuar.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // 1. Pega a Chave Pública da Stripe no Backend
                const configRes = await fetch('/api/config/stripe');
                const configData = await configRes.json();
                
                if (!configData.publicKey) {
                    throw new Error("Chave Pública não encontrada. Verifique as variáveis de ambiente.");
                }
                
                const stripe = Stripe(configData.publicKey);

                // 2. Chama a rota para criar a Intenção de Pagamento (Payment Intent)
                const processRes = await fetch('/api/pagamento/processar', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${tokenAuth}` }
                });
                const data = await processRes.json();

                if (data.erro) {
                    throw new Error(data.erro);
                }

                const clientSecret = data.clientSecret;

                // 3. Monta o formulário Stripe Elements na tela
                const appearance = { theme: 'stripe' };
                const elements = stripe.elements({ appearance, clientSecret });
                
                const paymentElement = elements.create('payment');
                
                // Limpa o container e monta o formulário real
                document.getElementById('payment-element').innerHTML = '';
                paymentElement.mount('#payment-element');

                // 4. Intercepta o clique no botão "Pagar Agora"
                const form = document.getElementById('payment-form');
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const btnText = document.getElementById('button-text');
                    const btnSubmit = document.getElementById('submit');
                    
                    btnText.innerText = "Processando...";
                    btnSubmit.disabled = true;
                    btnSubmit.style.background = "#555";

                    // A Stripe processa tudo com segurança e redireciona automaticamente em caso de sucesso
                    const { error } = await stripe.confirmPayment({
                        elements,
                        confirmParams: {
                            // Manda o usuário para a tela de sucesso assim que o pagamento for aprovado
                            return_url: window.location.origin + '/sucesso.html',
                        }
                    });

                    // Se o código chegou aqui, significa que a transação falhou (ex: sem limite, dados errados)
                    if (error) {
                        const messageContainer = document.getElementById('payment-message');
                        messageContainer.classList.remove('hidden');
                        messageContainer.textContent = error.message;
                        
                        btnText.innerText = "Pagar Agora";
                        btnSubmit.disabled = false;
                        btnSubmit.style.background = "#111";
                    }
                });

            } catch (error) {
                console.error("Erro na integração Stripe:", error);
                document.getElementById('payment-element').innerHTML = `
                    <div style="padding: 20px; text-align:center; border: 1px solid #dc3545; border-radius: 8px; background: #fff8f8;">
                        <h4 style="color: #dc3545; margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i> Falha na Integração</h4>
                        <p style="color: #666; font-size: 0.9rem;">${error.message || "Erro desconhecido ao carregar o checkout."}</p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
