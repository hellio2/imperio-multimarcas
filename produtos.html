<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilíbrio Multimarcas | Catálogo</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/componentes/produto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">Equilíbrio<span>.</span></a>
            </div>
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="produtos.html" class="active">Produtos</a>
                <a href="favoritos.html">Favoritos</a>
            </nav>
            <div class="header-actions">
                <!-- O botão de admin será injetado dinamicamente aqui dentro se o usuário for qualificado -->
                <div id="menu-admin-container"></div>
                <a href="favoritos.html" class="action-icon">
                    <i class="far fa-heart"></i>
                    <span class="badge" id="fav-badge">0</span>
                </a>
                <a href="#" class="action-icon open-cart"> 
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cart-badge">0</span>
                </a>
                <i class="fas fa-bars menu-toggle"></i>
            </div>
        </div>
    </header>

    <div class="page-layout">
        <aside class="filters-sidebar">
            <div class="filter-section">
                <h4>Categorias</h4>
                <ul class="filter-list">
                    <li><label><input type="checkbox" checked> Camisetas</label></li>
                    <li><label><input type="checkbox" checked> Jaquetas</label></li>
                    <li><label><input type="checkbox" checked> Calças</label></li>
                    <li><label><input type="checkbox" checked> Moletons</label></li>
                    <li><label><input type="checkbox" checked> Acessórios</label></li>
                </ul>
            </div>
            <div class="filter-section">
                <h4>Preço</h4>
                <ul class="filter-list">
                    <li><label><input type="radio" name="price" checked> Todos os preços</label></li>
                    <li><label><input type="radio" name="price"> Até R$ 150</label></li>
                    <li><label><input type="radio" name="price"> R$ 150 a R$ 300</label></li>
                    <li><label><input type="radio" name="price"> Acima de R$ 300</label></li>
                </ul>
            </div>
        </aside>

        <main>
            <div class="products-grid" id="catalog-grid">
            </div>
        </main>
    </div>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 Equilíbrio Multimarcas. Todos os direitos reservados.
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/favoritos.js"></script>
    <script src="js/carrinho.js"></script>
    
    <script>
        document.addEventListener("produtosCarregados", () => {
            const grid = document.getElementById("catalog-grid");
            if (!grid) return;
            
            const favs = JSON.parse(localStorage.getItem("equilibrio_favorites") || "[]");
            
            grid.innerHTML = PRODUTOS_DB.map(prod => `
                <div class="product-card">
                    ${prod.badge ? `<div class="product-badge">${prod.badge}</div>` : ''}
                    <button class="fav-btn-pos ${favs.includes(prod.id) ? 'active' : ''}" onclick="typeof alternarFavorito === 'function' ? alternarFavorito(${prod.id}) : null; this.classList.toggle('active');">
                        <i class="fas fa-heart"></i>
                    </button>
                    <div class="product-img-wrapper" onclick="window.location.href='produto-detalhe.html?id=${prod.id}'" style="cursor:pointer;">
                        <div class="product-img-placeholder" style="background: none; padding: 0; display: flex; align-items: center; justify-content: center; height: 100%; overflow: hidden;">
                            ${prod.imagem_url 
                                ? `<img src="${prod.imagem_url}" alt="${prod.nome}" style="width: 100%; height: 100%; object-fit: cover;">` 
                                : `<span style="font-size: 2.5rem;">👕</span>`
                            }
                        </div>
                    </div>
                    <div class="product-info">
                        <div class="product-cat">${prod.categoria || 'Geral'}</div>
                        <div class="product-title" onclick="window.location.href='produto-detalhe.html?id=${prod.id}'" style="cursor:pointer;">${prod.nome}</div>
                        <div class="product-price-box">
                            ${prod.preco_antigo ? `<span class="old-price">${formatarMoeda(prod.preco_antigo)}</span>` : ''}
                            <span class="new-price">${formatarMoeda(prod.preco)}</span>
                        </div>
                        <button class="add-to-cart-btn" onclick="adicionarAoCarrinhoGlobal(${prod.id})">
                            <i class="fas fa-shopping-cart"></i> Adicionar
                        </button>
                    </div>
                </div>
            `).join('');
        });
    </script>

    <div id="toast-container" class="toast-container"></div>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-drawer-header">
            <h3>Seu Carrinho</h3>
            <button class="close-cart-btn" id="close-cart-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-drawer-body" id="minicart-body"></div>
        <div class="cart-drawer-footer">
            <div class="cart-drawer-total">
                <span>Subtotal:</span>
                <span id="minicart-total">R$ 0,00</span>
            </div>
            <button class="hero-btn" style="width: 100%; text-align: center;" onclick="window.location.href='checkout.html'">Finalizar Compra</button>
        </div>
    </div>
</body>
</html>
